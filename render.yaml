services:
  - type: web
    name: ai-website-audit
    env: python
    plan: free
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      pip install -e .
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # Fill these in the Render dashboard or set values here
      - key: MISTRAL_API_KEY
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
